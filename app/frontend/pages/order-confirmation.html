<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmation - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-lg">
          <div class="card-body p-5 text-center">
            <div class="success-icon mb-4">
              <h1 class="display-1" style="color: #28a745;">✓</h1>
            </div>

            <h2 class="mb-3">Order Placed Successfully!</h2>
            <p class="lead text-muted mb-4">Thank you for your purchase</p>

            <div class="alert alert-info mb-4">
              <p class="mb-1"><strong>Order ID:</strong> <span id="orderId">-</span></p>
              <p class="mb-1"><strong>Order Date:</strong> <span id="orderDate">-</span></p>
              <p class="mb-0"><strong>Status:</strong> <span class="badge bg-info" id="orderStatus">Pending</span></p>
            </div>

            <div class="card mb-4 bg-light">
              <div class="card-body">
                <h5>Order Details</h5>
                <div id="orderDetails" class="text-start">
                  <!-- Details will be loaded here -->
                </div>
              </div>
            </div>

            <div class="card mb-4 bg-light">
              <div class="card-body">
                <h5>Shipping Address</h5>
                <div id="shippingInfo" class="text-start">
                  <!-- Shipping info will be loaded here -->
                </div>
              </div>
            </div>

            <div class="d-grid gap-2">
              <a href="/pages/my-orders.html" class="btn btn-primary btn-lg">View My Orders</a>
              <a href="/pages/products.html" class="btn btn-outline-primary btn-lg">Continue Shopping</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 eStore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function loadOrderConfirmation() {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('id');

      if (!orderId) {
        window.location.href = '/';
        return;
      }

      const token = localStorage.getItem('token');

      try {
        const response = await fetch(`/api/orders/${orderId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const result = await response.json();

        if (result.success) {
          const order = result.data;
          
          document.getElementById('orderId').textContent = order._id;
          document.getElementById('orderDate').textContent = new Date(order.orderDate).toLocaleDateString();
          document.getElementById('orderStatus').textContent = order.status;

          // Order details
          const detailsHtml = `
            <p><strong>Total Amount:</strong> $${order.totalAmount.toFixed(2)}</p>
            <p><strong>Payment Method:</strong> ${order.paymentMethod.replace('_', ' ').toUpperCase()}</p>
            <p><strong>Payment Status:</strong> <span class="badge ${order.paymentStatus === 'paid' ? 'bg-success' : 'bg-warning'}">${order.paymentStatus.toUpperCase()}</span></p>
            <h6 class="mt-3">Items:</h6>
            <ul class="list-unstyled">
              ${order.items.map(item => `
                <li>• ${item.productName} x ${item.quantity} = $${(item.price * item.quantity).toFixed(2)}</li>
              `).join('')}
            </ul>
          `;
          document.getElementById('orderDetails').innerHTML = detailsHtml;

          // Shipping info
          const shipping = order.shippingAddress;
          const shippingHtml = `
            <p>${shipping.fullName}</p>
            <p>${shipping.address}</p>
            <p>${shipping.city}, ${shipping.state} ${shipping.zipCode}</p>
            <p>${shipping.country}</p>
            <p>Phone: ${shipping.phone}</p>
          `;
          document.getElementById('shippingInfo').innerHTML = shippingHtml;
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', loadOrderConfirmation);
  </script>
</body>
</html>
