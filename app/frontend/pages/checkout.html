<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/cart.html">
            <i class="bi bi-cart"></i> Cart <span id="cartCount" class="badge bg-danger">0</span>
          </a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="mb-4">Checkout</h2>

    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Shipping Address</h5>
          </div>
          <div class="card-body">
            <form id="checkoutForm">
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="fullName" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-control" id="phone" required>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="address" required>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">City</label>
                  <input type="text" class="form-control" id="city" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">State</label>
                  <input type="text" class="form-control" id="state" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">ZIP Code</label>
                  <input type="text" class="form-control" id="zipCode" required>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Country</label>
                <input type="text" class="form-control" id="country" required>
              </div>
            </form>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Payment Method</h5>
          </div>
          <div class="card-body">
            <div class="form-check mb-3">
              <input class="form-check-input" type="radio" name="paymentMethod" id="cod" value="cash_on_delivery" checked>
              <label class="form-check-label" for="cod">
                Cash on Delivery
              </label>
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="radio" name="paymentMethod" id="card" value="card">
              <label class="form-check-label" for="card">
                Credit/Debit Card
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="paymentMethod" id="bank" value="bank">
              <label class="form-check-label" for="bank">
                Bank Transfer
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card sticky-top" style="top: 80px;">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Order Summary</h5>
          </div>
          <div class="card-body">
            <div id="orderItems">
              <!-- Items will be loaded here -->
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal:</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Shipping:</span>
              <span>$5.00</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span>Tax:</span>
              <span id="tax">$0.00</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-4">
              <strong>Total:</strong>
              <strong id="total" class="text-primary">$0.00</strong>
            </div>
            <button type="button" class="btn btn-primary w-100" onclick="placeOrder()">Place Order</button>
            <a href="/pages/cart.html" class="btn btn-outline-secondary w-100 mt-2">Back to Cart</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 eStore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function loadCheckout() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');

      if (!token) {
        window.location.href = '/pages/login.html';
        return;
      }

      try {
        // Load user profile
        const profileResponse = await fetch('/api/auth/profile', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const profileResult = await profileResponse.json();

        if (profileResult.success) {
          const profile = profileResult.user;
          document.getElementById('fullName').value = profile.name;
          document.getElementById('phone').value = profile.phone || '';
          document.getElementById('address').value = profile.address || '';
          document.getElementById('city').value = profile.city || '';
          document.getElementById('state').value = profile.state || '';
          document.getElementById('zipCode').value = profile.zipCode || '';
          document.getElementById('country').value = profile.country || '';
        }

        // Load cart
        const cartResponse = await fetch('/api/cart', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const cartResult = await cartResponse.json();

        if (cartResult.success) {
          displayOrderSummary(cartResult.data);
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function displayOrderSummary(cart) {
      const itemsHtml = cart.items.map(item => `
        <div class="d-flex justify-content-between mb-2 pb-2 border-bottom">
          <span>${item.productId.name} x ${item.quantity}</span>
          <span>$${(item.price * item.quantity).toFixed(2)}</span>
        </div>
      `).join('');

      document.getElementById('orderItems').innerHTML = itemsHtml;

      const subtotal = cart.totalPrice;
      const shipping = 5.00;
      const tax = (subtotal * 0.1).toFixed(2);
      const total = (subtotal + shipping + parseFloat(tax)).toFixed(2);

      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('tax').textContent = `$${tax}`;
      document.getElementById('total').textContent = `$${total}`;
    }

    async function placeOrder() {
      const token = localStorage.getItem('token');

      const shippingAddress = {
        fullName: document.getElementById('fullName').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zipCode: document.getElementById('zipCode').value,
        country: document.getElementById('country').value,
      };

      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

      try {
        const response = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ shippingAddress, paymentMethod })
        });

        const result = await response.json();

        if (result.success) {
          alert('Order placed successfully!');
          window.location.href = `/pages/order-confirmation.html?id=${result.data._id}`;
        } else {
          alert(result.message || 'Error placing order');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error placing order');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateAuthNav();
      loadCheckout();
    });
  </script>
</body>
</html>
