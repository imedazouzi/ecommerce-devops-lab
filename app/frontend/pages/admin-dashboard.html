<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/pages/admin-dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin-products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin-manage-orders.html">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <div class="row mb-4">
      <div class="col-md-3">
        <div class="card">
          <div class="card-body">
            <h6 class="card-title text-muted">Total Products</h6>
            <h3 id="totalProducts">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card">
          <div class="card-body">
            <h6 class="card-title text-muted">Total Orders</h6>
            <h3 id="totalOrders">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card">
          <div class="card-body">
            <h6 class="card-title text-muted">Total Revenue</h6>
            <h3 id="totalRevenue">$0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card">
          <div class="card-body">
            <h6 class="card-title text-muted">Pending Orders</h6>
            <h3 id="pendingOrders">0</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-8">
        <h4 class="mb-3">Quick Actions</h4>
        <div class="d-grid gap-2 d-sm-flex mb-4">
          <a href="/pages/admin-add-product.html" class="btn btn-primary">+ Add Product</a>
          <a href="/pages/admin-products.html" class="btn btn-outline-primary">Manage Products</a>
          <a href="/pages/admin-manage-orders.html" class="btn btn-outline-primary">Manage Orders</a>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <h4 class="mb-3">Recent Orders</h4>
        <div id="recentOrders" class="table-responsive">
          <!-- Recent orders will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function loadDashboard() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');

      if (!token || user.role !== 'admin') {
        window.location.href = '/pages/login.html';
        return;
      }

      try {
        // Load stats
        const statsResponse = await fetch('/api/orders/stats/overview', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const statsResult = await statsResponse.json();

        if (statsResult.success) {
          document.getElementById('totalOrders').textContent = statsResult.data.totalOrders;
          document.getElementById('totalRevenue').textContent = '$' + statsResult.data.totalRevenue.toFixed(2);
          document.getElementById('pendingOrders').textContent = statsResult.data.pendingOrders;
        }

        // Load recent orders
        const ordersResponse = await fetch('/api/orders?limit=5', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const ordersResult = await ordersResponse.json();

        if (ordersResult.success) {
          displayRecentOrders(ordersResult.data);
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function displayRecentOrders(orders) {
      const table = `
        <table class="table table-hover">
          <thead class="table-dark">
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(order => `
              <tr>
                <td>#${order._id.substring(0, 8)}</td>
                <td>${order.userId.name}</td>
                <td>$${order.totalAmount.toFixed(2)}</td>
                <td><span class="badge bg-${getStatusColor(order.status)}">${order.status}</span></td>
                <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                <td><a href="/pages/admin-manage-orders.html" class="btn btn-sm btn-info">View</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('recentOrders').innerHTML = table;
    }

    function getStatusColor(status) {
      const colors = {
        pending: 'warning',
        confirmed: 'info',
        processing: 'primary',
        shipped: 'secondary',
        delivered: 'success',
        cancelled: 'danger'
      };
      return colors[status] || 'secondary';
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
