<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/cart.html">
            <i class="bi bi-cart"></i> Cart <span id="cartCount" class="badge bg-danger">0</span>
          </a></li>
          <li class="nav-item" id="authNav">
            <a class="nav-link" href="/pages/login.html">Login</a>
          </li>
          <li class="nav-item" id="userNav" style="display:none;">
            <div class="dropdown">
              <button class="btn btn-link nav-link dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                <span id="userName">User</span>
              </button>
              <ul class="dropdown-menu" aria-labelledby="userDropdown">
                <li><a class="dropdown-item" href="/pages/profile.html">Profile</a></li>
                <li><a class="dropdown-item" href="/pages/my-orders.html">My Orders</a></li>
                <li id="adminLink" style="display:none;"><a class="dropdown-item" href="/pages/admin-dashboard.html">Admin Dashboard</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
              </ul>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="/pages/products.html">Products</a></li>
        <li class="breadcrumb-item active" id="breadcrumbName">Product</li>
      </ol>
    </nav>

    <div id="productDetail" class="row">
      <!-- Product will be loaded here -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 eStore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function loadProductDetail() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      if (!productId) {
        window.location.href = '/pages/products.html';
        return;
      }

      try {
        const response = await fetch(`/api/products/${productId}`);
        const result = await response.json();

        if (result.success) {
          const product = result.data;
          const container = document.getElementById('productDetail');

          document.getElementById('breadcrumbName').textContent = product.name;

          container.innerHTML = `
            <div class="col-lg-5">
              <img src="${product.image}" alt="${product.name}" class="img-fluid rounded mb-4">
            </div>
            <div class="col-lg-7">
              <h1 class="mb-2">${product.name}</h1>
              <div class="d-flex align-items-center mb-3">
                <span class="rating me-2">⭐ ${product.rating}</span>
                <span class="badge bg-info">${product.category}</span>
              </div>

              <div class="mb-4">
                <h3 class="text-primary">$${product.price}</h3>
                ${product.originalPrice ? `<p class="text-muted"><strike>$${product.originalPrice}</strike></p>` : ''}
              </div>

              <div class="mb-4">
                <p class="lead">${product.description}</p>
              </div>

              <div class="mb-4">
                <p><strong>Stock Available:</strong> <span class="badge ${product.stock > 0 ? 'bg-success' : 'bg-danger'}">${product.stock > 0 ? 'In Stock (' + product.stock + ')' : 'Out of Stock'}</span></p>
              </div>

              ${product.stock > 0 ? `
              <div class="mb-4">
                <div class="input-group" style="width: 150px;">
                  <button class="btn btn-outline-secondary" type="button" onclick="decreaseQty()">-</button>
                  <input type="number" id="quantity" class="form-control text-center" value="1" min="1" max="${product.stock}">
                  <button class="btn btn-outline-secondary" type="button" onclick="increaseQty(${product.stock})">+</button>
                </div>
              </div>

              <div class="d-flex gap-2 mb-4">
                <button class="btn btn-primary btn-lg" onclick="addToCart('${productId}')">Add to Cart</button>
                <button class="btn btn-outline-primary btn-lg">❤️ Wishlist</button>
              </div>
              ` : ''}

              <div class="bg-light p-3 rounded">
                <h6 class="mb-3">Product Information</h6>
                <ul class="list-unstyled">
                  <li><strong>Category:</strong> ${product.category}</li>
                  <li><strong>Stock:</strong> ${product.stock} units</li>
                  <li><strong>Added:</strong> ${new Date(product.createdAt).toLocaleDateString()}</li>
                </ul>
              </div>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error loading product:', error);
        alert('Error loading product. Please try again.');
        window.location.href = '/pages/products.html';
      }
    }

    function increaseQty(maxStock) {
      const input = document.getElementById('quantity');
      if (parseInt(input.value) < maxStock) {
        input.value = parseInt(input.value) + 1;
      }
    }

    function decreaseQty() {
      const input = document.getElementById('quantity');
      if (parseInt(input.value) > 1) {
        input.value = parseInt(input.value) - 1;
      }
    }

    async function addToCart(productId) {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Please login first');
        window.location.href = '/pages/login.html';
        return;
      }

      const quantity = parseInt(document.getElementById('quantity').value);

      try {
        const response = await fetch('/api/cart/add', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ productId, quantity })
        });

        const result = await response.json();

        if (result.success) {
          updateCartCount();
          alert('Product added to cart!');
          document.getElementById('quantity').value = 1;
        } else {
          alert(result.message || 'Error adding to cart');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error adding to cart');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateAuthNav();
      loadProductDetail();
    });
  </script>
</body>
</html>
