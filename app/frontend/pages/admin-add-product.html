<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - eStore Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/pages/admin-dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin-products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/admin-manage-orders.html">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h2 class="mb-4">Add New Product</h2>

        <div class="card shadow">
          <div class="card-body">
            <form id="productForm" enctype="multipart/form-data">
              <div class="mb-3">
                <label for="name" class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="name" placeholder="Enter product name" required>
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">Description *</label>
                <textarea class="form-control" id="description" rows="4" placeholder="Enter product description" required></textarea>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="price" class="form-label">Price *</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="price" step="0.01" placeholder="0.00" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <label for="originalPrice" class="form-label">Original Price</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="originalPrice" step="0.01" placeholder="0.00">
                  </div>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="category" class="form-label">Category *</label>
                  <select class="form-select" id="category" required>
                    <option value="">Select Category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Home">Home</option>
                    <option value="Sports">Sports</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="stock" class="form-label">Stock Quantity *</label>
                  <input type="number" class="form-control" id="stock" min="0" placeholder="0" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="image" class="form-label">Product Image</label>
                <input type="file" class="form-control" id="image" accept="image/*">
                <small class="text-muted">Max file size: 5MB. Formats: JPG, PNG, GIF</small>
              </div>

              <div class="d-grid gap-2 d-sm-flex">
                <button type="submit" class="btn btn-primary btn-lg">Add Product</button>
                <a href="/pages/admin-products.html" class="btn btn-outline-secondary btn-lg">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = localStorage.getItem('token');

      if (!token) {
        alert('Please login first');
        window.location.href = '/pages/login.html';
        return;
      }

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('price', document.getElementById('price').value);
      formData.append('originalPrice', document.getElementById('originalPrice').value);
      formData.append('category', document.getElementById('category').value);
      formData.append('stock', document.getElementById('stock').value);

      if (document.getElementById('image').files.length > 0) {
        formData.append('image', document.getElementById('image').files[0]);
      }

      try {
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          alert('Product added successfully!');
          window.location.href = '/pages/admin-products.html';
        } else {
          alert(result.message || 'Error adding product');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error adding product');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      if (user.role !== 'admin') {
        window.location.href = '/pages/login.html';
      }
    });
  </script>
</body>
</html>
