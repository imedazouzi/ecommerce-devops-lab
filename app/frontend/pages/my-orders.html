<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/cart.html">
            <i class="bi bi-cart"></i> Cart <span id="cartCount" class="badge bg-danger">0</span>
          </a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="mb-4">My Orders</h2>

    <div id="ordersEmpty" class="alert alert-info text-center py-5">
      <h4>No orders yet</h4>
      <p>Start shopping to place your first order!</p>
      <a href="/pages/products.html" class="btn btn-primary">Shop Now</a>
    </div>

    <div id="ordersList" style="display:none;">
      <div class="row g-4">
        <!-- Orders will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 eStore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function loadOrders() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = '/pages/login.html';
        return;
      }

      try {
        const response = await fetch('/api/orders/my-orders', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const result = await response.json();

        if (result.success && result.data.length > 0) {
          displayOrders(result.data);
          document.getElementById('ordersEmpty').style.display = 'none';
          document.getElementById('ordersList').style.display = 'block';
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function displayOrders(orders) {
      const container = document.getElementById('ordersList').querySelector('.row');
      const html = orders.map(order => `
        <div class="col-lg-6">
          <div class="card">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <h6>Order #${order._id.substring(0, 8)}</h6>
                  <small class="text-muted">${new Date(order.orderDate).toLocaleDateString()}</small>
                </div>
                <span class="badge ${getStatusBadge(order.status)}">${order.status.toUpperCase()}</span>
              </div>

              <div class="mb-3">
                <p class="mb-1"><strong>Items:</strong> ${order.items.length}</p>
                <p class="mb-1"><strong>Total:</strong> <span class="text-primary">$${order.totalAmount.toFixed(2)}</span></p>
                <p class="mb-0"><strong>Payment:</strong> <span class="badge ${order.paymentStatus === 'paid' ? 'bg-success' : 'bg-warning'}">${order.paymentStatus.toUpperCase()}</span></p>
              </div>

              <a href="/pages/order-confirmation.html?id=${order._id}" class="btn btn-sm btn-primary">View Details</a>
            </div>
          </div>
        </div>
      `).join('');

      container.innerHTML = html;
    }

    function getStatusBadge(status) {
      const badges = {
        pending: 'bg-warning',
        confirmed: 'bg-info',
        processing: 'bg-primary',
        shipped: 'bg-secondary',
        delivered: 'bg-success',
        cancelled: 'bg-danger'
      };
      return badges[status] || 'bg-secondary';
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateAuthNav();
      loadOrders();
    });
  </script>
</body>
</html>
