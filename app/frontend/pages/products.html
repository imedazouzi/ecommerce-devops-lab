<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/cart.html">
            <i class="bi bi-cart"></i> Cart <span id="cartCount" class="badge bg-danger">0</span>
          </a></li>
          <li class="nav-item" id="authNav">
            <a class="nav-link" href="/pages/login.html">Login</a>
          </li>
          <li class="nav-item" id="userNav" style="display:none;">
            <div class="dropdown">
              <button class="btn btn-link nav-link dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                <span id="userName">User</span>
              </button>
              <ul class="dropdown-menu" aria-labelledby="userDropdown">
                <li><a class="dropdown-item" href="/pages/profile.html">Profile</a></li>
                <li><a class="dropdown-item" href="/pages/my-orders.html">My Orders</a></li>
                <li id="adminLink" style="display:none;"><a class="dropdown-item" href="/pages/admin-dashboard.html">Admin Dashboard</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
              </ul>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <div class="row">
      <!-- Sidebar Filters -->
      <div class="col-lg-3">
        <div class="card sticky-top" style="top: 80px;">
          <div class="card-body">
            <h5 class="card-title">Filters</h5>
            
            <!-- Search -->
            <div class="mb-3">
              <label class="form-label">Search</label>
              <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
            </div>

            <!-- Category Filter -->
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select id="categoryFilter" class="form-select">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Books">Books</option>
                <option value="Home">Home</option>
                <option value="Sports">Sports</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <!-- Sort -->
            <div class="mb-3">
              <label class="form-label">Sort By</label>
              <select id="sortFilter" class="form-select">
                <option value="-createdAt">Newest</option>
                <option value="price">Price: Low to High</option>
                <option value="-price">Price: High to Low</option>
                <option value="-rating">Rating: High to Low</option>
              </select>
            </div>

            <button class="btn btn-primary w-100" onclick="applyFilters()">Apply Filters</button>
            <button class="btn btn-outline-secondary w-100 mt-2" onclick="resetFilters()">Reset</button>
          </div>
        </div>
      </div>

      <!-- Products -->
      <div class="col-lg-9">
        <h2 class="mb-4">Our Products</h2>
        <div id="productsContainer" class="row g-4">
          <!-- Products will be loaded here -->
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" class="mt-5">
          <ul id="pagination" class="pagination justify-content-center">
            <!-- Pagination will be loaded here -->
          </ul>
        </nav>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 eStore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let currentPage = 1;
    let filters = {
      search: '',
      category: '',
      sort: '-createdAt'
    };

    async function loadProducts(page = 1) {
      try {
        const params = new URLSearchParams();
        params.append('page', page);
        params.append('limit', 12);
        if (filters.search) params.append('search', filters.search);
        if (filters.category) params.append('category', filters.category);
        params.append('sort', filters.sort);

        const response = await fetch(`/api/products?${params}`);
        const result = await response.json();

        if (result.success) {
          const container = document.getElementById('productsContainer');
          container.innerHTML = result.data.map(product => `
            <div class="col-md-6 col-lg-4">
              <div class="product-card">
                <img src="${product.image}" alt="${product.name}" class="product-img">
                <div class="product-info">
                  <p class="category-badge">${product.category}</p>
                  <h6 class="product-name">${product.name}</h6>
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="product-price mb-0">$${product.price}</p>
                    <span class="rating">⭐ ${product.rating}</span>
                  </div>
                  <a href="/pages/product-detail.html?id=${product._id}" class="btn btn-sm btn-primary w-100">View Details</a>
                </div>
              </div>
            </div>
          `).join('');

          // Load pagination
          loadPagination(result.pagination);
          currentPage = page;
        }
      } catch (error) {
        console.error('Error loading products:', error);
      }
    }

    function loadPagination(pagination) {
      const container = document.getElementById('pagination');
      let html = '';

      if (pagination.page > 1) {
        html += `<li class="page-item"><a class="page-link" href="#" onclick="loadProducts(${pagination.page - 1})">Previous</a></li>`;
      }

      for (let i = 1; i <= pagination.pages; i++) {
        if (i === pagination.page) {
          html += `<li class="page-item active"><span class="page-link">${i}</span></li>`;
        } else {
          html += `<li class="page-item"><a class="page-link" href="#" onclick="loadProducts(${i})">${i}</a></li>`;
        }
      }

      if (pagination.page < pagination.pages) {
        html += `<li class="page-item"><a class="page-link" href="#" onclick="loadProducts(${pagination.page + 1})">Next</a></li>`;
      }

      container.innerHTML = html;
    }

    function applyFilters() {
      filters.search = document.getElementById('searchInput').value;
      filters.category = document.getElementById('categoryFilter').value;
      filters.sort = document.getElementById('sortFilter').value;
      loadProducts(1);
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('sortFilter').value = '-createdAt';
      filters = { search: '', category: '', sort: '-createdAt' };
      loadProducts(1);
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateAuthNav();
      loadProducts(1);
    });
  </script>
</body>
</html>
