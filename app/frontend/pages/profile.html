<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🛍️ eStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/cart.html">
            <i class="bi bi-cart"></i> Cart <span id="cartCount" class="badge bg-danger">0</span>
          </a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h2 class="mb-4">My Profile</h2>

        <div class="card shadow">
          <div class="card-body">
            <form id="profileForm">
              <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" disabled>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" disabled>
              </div>

              <hr>

              <h5 class="mb-3">Shipping Information</h5>

              <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone">
              </div>

              <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address">
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="city" class="form-label">City</label>
                  <input type="text" class="form-control" id="city">
                </div>
                <div class="col-md-3">
                  <label for="state" class="form-label">State</label>
                  <input type="text" class="form-control" id="state">
                </div>
                <div class="col-md-3">
                  <label for="zipCode" class="form-label">ZIP Code</label>
                  <input type="text" class="form-control" id="zipCode">
                </div>
              </div>

              <div class="mb-3">
                <label for="country" class="form-label">Country</label>
                <input type="text" class="form-control" id="country">
              </div>

              <div class="d-grid gap-2 d-sm-flex">
                <button type="submit" class="btn btn-primary btn-lg">Update Profile</button>
                <a href="/" class="btn btn-outline-secondary btn-lg">Back Home</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 eStore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function loadProfile() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = '/pages/login.html';
        return;
      }

      try {
        const response = await fetch('/api/auth/profile', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const result = await response.json();

        if (result.success) {
          const user = result.user;
          document.getElementById('name').value = user.name;
          document.getElementById('email').value = user.email;
          document.getElementById('phone').value = user.phone || '';
          document.getElementById('address').value = user.address || '';
          document.getElementById('city').value = user.city || '';
          document.getElementById('state').value = user.state || '';
          document.getElementById('zipCode').value = user.zipCode || '';
          document.getElementById('country').value = user.country || '';
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = localStorage.getItem('token');

      try {
        const response = await fetch('/api/auth/profile', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            city: document.getElementById('city').value,
            state: document.getElementById('state').value,
            zipCode: document.getElementById('zipCode').value,
            country: document.getElementById('country').value,
          })
        });

        const result = await response.json();

        if (result.success) {
          alert('Profile updated successfully!');
        } else {
          alert(result.message || 'Error updating profile');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error updating profile');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      updateAuthNav();
      loadProfile();
    });
  </script>
</body>
</html>
